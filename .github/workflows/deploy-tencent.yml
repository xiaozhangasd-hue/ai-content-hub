name: CI/CD Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Use npm mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          pnpm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Create deployment archive
        run: |
          tar \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=data \
            --exclude=logs \
            --exclude=.env \
            --exclude=.env.local \
            --exclude='.env.*' \
            -czf ai-content-hub-release.tgz .

      - name: Upload deployment archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_PORT }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: ai-content-hub-release.tgz
          target: /tmp

      - name: Deploy archive to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          port: ${{ secrets.PROD_PORT }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            export PATH="/usr/local/node20/bin:$PATH"
            APP_DIR="/opt/ai-content-hub"
            TMP_ENV="/tmp/ai-content-hub.env.backup"
            RELEASE_TGZ="/tmp/ai-content-hub-release.tgz"

            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$TMP_ENV"
            fi

            mkdir -p "$APP_DIR"
            tar -xzf "$RELEASE_TGZ" -C "$APP_DIR"
            rm -f "$RELEASE_TGZ"

            cd "$APP_DIR"
            git -c safe.directory="$APP_DIR" reset --hard HEAD
            git -c safe.directory="$APP_DIR" clean -fd -e .env

            if [ -f "$TMP_ENV" ]; then
              mv "$TMP_ENV" "$APP_DIR/.env"
            fi

            bash scripts/deploy-production.sh
